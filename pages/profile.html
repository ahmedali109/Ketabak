<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile | Ketabak</title>
    <meta name="description" content="Manage your Ketabak account, view your wishlist, and checkout your orders." />
    
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/profile.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>

    <main class="profile-page" aria-label="User Profile">
      <div class="profile-cover" aria-hidden="true"></div>

      <div class="profile-container">
        <aside class="profile-sidebar" aria-label="Profile Navigation">
          <div class="user-card-box">
            <div class="avatar-container">
              <img
                src="../images/author.jpg"
                alt="User Profile Picture"
                id="userAvatarImg"
              />
              <button class="edit-avatar-btn" aria-label="Change profile picture">
                <i class="fas fa-camera" aria-hidden="true"></i>
              </button>
            </div>
            <h1 id="profileFullName">Loading...</h1>
            <p id="profileEmail">loading@example.com</p>

            <nav class="user-actions-menu" aria-label="Account Menu">
              <button class="menu-btn active" id="myAccountBtn" aria-current="page">
                <i class="fas fa-user" aria-hidden="true"></i> My Account
              </button>
              <button class="menu-btn" id="viewWishlistBtn">
                <i class="fas fa-heart" aria-hidden="true"></i> Wishlist
              </button>
              <button class="menu-btn" id="viewCheckoutBtn">
                <i class="fas fa-box" aria-hidden="true"></i> Checkout
              </button>
              <button class="menu-btn logout-action" id="profileLogoutBtn">
                <i class="fas fa-sign-out-alt" aria-hidden="true"></i> Logout
              </button>
            </nav>
          </div>
        </aside>

        <div class="profile-content-wrapper" style="flex: 2;">
          <section id="wishlistSection" class="profile-main-content" aria-labelledby="wishlist-title">
            <h2 id="wishlist-title" class="content-title">My Wishlist & Saved Books</h2>
            <div class="wishlist-grid" id="wishlistContainer" aria-live="polite"></div>
          </section>

          <section id="checkoutSection" class="profile-main-content hidden" aria-labelledby="checkout-title" aria-hidden="true">
            <h2 id="checkout-title" class="content-title">Secure Checkout</h2>
            <div class="checkout-grid" id="checkoutContainer" aria-live="polite"></div>
          </section>
        </div>
      </div>
    </main>

    <script src="./utils/header.js"></script>
    <script src="../js/cart.js"></script>
    <script src="./utils/footer.js"></script>
    <script src="../js/profile.js"></script>
  </body>
</html>
