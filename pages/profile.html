<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/profile.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />

    <title>My Profile</title>
  </head>
  <body>
    <header class="header" style="background-color: var(--second-color)">
      <div class="header-container">
        <a href="../pages/index.html" class="logo" style="text-decoration: none"
          >ketabak</a
        >
        <div class="header-actions"></div>
      </div>
    </header>

    <main class="profile-page">
      <div class="profile-cover"></div>

      <div class="profile-container">
        <aside class="profile-sidebar">
          <div class="user-card-box">
            <div class="avatar-container">
              <img
                src="../images/author.jpg"
                alt="User Avatar"
                id="userAvatarImg"
              />
              <button class="edit-avatar-btn">
                <i class="fas fa-camera"></i>
              </button>
            </div>
            <h2 id="profileFullName">Loading name...</h2>
            <p id="profileEmail">loading.email@example.com</p>

            <div class="user-actions-menu">
              <button class="menu-btn active">
                <i class="fas fa-user"></i> My Account
              </button>
              <button class="menu-btn">
                <i class="fas fa-heart"></i> Wishlist
              </button>
              <button class="menu-btn logout-action" id="profileLogoutBtn">
                <i class="fas fa-sign-out-alt"></i> Logout
              </button>
            </div>
          </div>
        </aside>

        <section class="profile-main-content">
          <h3 class="content-title">My Wishlist & Saved Books</h3>

          <div class="wishlist-grid">
            <div class="modern-card">
              <div class="card-header">
                <span class="discount-badge">-20%</span>
              </div>
              <div class="book-image-container">
                <img
                  src="../images/bestsellers/bestseller-1.jpg"
                  alt="Book 1"
                  class="book-image"
                />
                <div class="book-overlay">
                  <button class="quick-view-btn">
                    <i class="fas fa-eye"></i> Quick View
                  </button>
                </div>
              </div>
              <div class="book-info">
                <span class="category-tag">Fiction</span>
                <h4 class="book-title">The Great Gatsby</h4>
                <div class="rating-container">
                  <div class="stars">★★★★☆</div>
                </div>
                <div class="current-price">$15.99</div>
              </div>
            </div>

            <div class="modern-card">
              <div class="book-image-container">
                <img
                  src="../images/bestsellers/bestseller-1.jpg"
                  alt="Book 2"
                  class="book-image"
                />
              </div>
              <div class="book-info">
                <span class="category-tag">Self Help</span>
                <h4 class="book-title">Atomic Habits</h4>
                <div class="current-price">$20.00</div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="../js/profile.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
