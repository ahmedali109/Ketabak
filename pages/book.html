<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Details | Ketabak</title>
    <meta name="description" content="View detailed information about this book, read the description, check availability, and add it to your cart." />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/book.css" />
  </head>
  <body>
    
    <main class="book-section" aria-label="Book details">
      <div class="book-hero">
        <div class="book-cover-container">
          <img id="book-cover" src="../images/placeholder.jpg" alt="Book Cover" class="book-cover" />
          <nav class="cover-nav" aria-label="Book navigation">
            <button class="nav-btn up" id="prev-btn" title="Previous Book" aria-label="Go to previous book">
              <i class="fa-solid fa-chevron-up" aria-hidden="true"></i>
            </button>
            <button class="nav-btn down" id="next-btn" title="Next Book" aria-label="Go to next book">
              <i class="fa-solid fa-chevron-down" aria-hidden="true"></i>
            </button>
          </nav>
        </div>

        <div class="book-info-header">
          <div class="badges" aria-live="polite">
            <span class="stock-badge" id="stock-badge">Loading...</span>
          </div>
          <h1 id="book-title">Loading Title...</h1>
          <h3 class="author">By: <span id="book-author">...</span></h3>
          <p class="subtitle-text" id="book-subtitle">Loading subtitle...</p>

          <div class="rating-display" id="stars-container" aria-label="Book rating"></div>

          <div class="action-buttons">
            <button class="btn-primary" id="addToCartBtn">
              Add to Cart - <span id="book-price">$0.00</span>
            </button>
            <div class="icon-actions">
              <button class="btn-icon" id="bookmarkBtn" title="Wishlist" aria-label="Add to wishlist">
                <i class="fa-regular fa-bookmark" aria-hidden="true"></i>
              </button>
              <button class="btn-icon" title="Share" aria-label="Share this book">
                <i class="fa-solid fa-share-nodes" aria-hidden="true"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="details-card">
        <div class="grid-layout">
          <section class="grid-item description" aria-labelledby="desc-heading">
            <h4 id="desc-heading">Description</h4>
            <p id="book-desc-main">Loading description...</p>

            <div class="publisher-info">
              <strong>Publisher:</strong>
              <span id="book-publisher">...</span> (<span id="book-year">...</span>)
            </div>
          </section>

          <section class="grid-item meta-data" aria-labelledby="meta-heading">
            <h4 class="visually-hidden" id="meta-heading">Additional Information</h4>
            <div class="meta-group">
              <h4>ISBN-13</h4>
              <p class="isbn" id="book-isbn">...</p>
            </div>
            <div class="meta-group">
              <h4>Availability</h4>
              <p id="book-stock" aria-live="polite">Checking...</p>
            </div>
            <div class="meta-group">
              <h4>External Link</h4>
              <a href="#" id="book-url" target="_blank" class="external-link" rel="noopener noreferrer" style="display: none;">
                View on Store <i class="fas fa-external-link-alt" aria-hidden="true"></i>
              </a>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script src="./utils/header.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/book.js"></script>
    <script src="./utils/footer.js"></script>
  </body>
</html>
